name: Python Package

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black
      - name: Flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 personavoice --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 personavoice --count --exit-zero --max-complexity=20 --max-line-length=120 --statistics
      - name: Black format check
        run: |
          black --check --line-length=100 personavoice || true

  import-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install minimal deps (CPU-only)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install -e .
      - name: Smoke import
        run: |
          python -c "import personavoice; print('PersonaVoice', personavoice.__version__)"
          python -c "from personavoice.config import SOTA_CONFIG; print('config OK:', SOTA_CONFIG.version)"
          python -c "from personavoice.microaug import OrthogonalEnvironmentSubmanifold; print('OES OK')"
          python -c "from personavoice.tts_backbone import VocosVocoder; print('Vocoder OK')"
